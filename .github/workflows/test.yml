name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Syntax check (all scripts)
        run: python -m py_compile daily-news/gmail/fetch.py daily-news/gmail/auth.py daily-news/calendar/fetch.py daily-news/calendar/auth.py daily-news/prune.py
      - name: Unit tests (gmail)
        run: python -m unittest discover -s daily-news/gmail -p 'test_*.py' -v
      - name: Unit tests (calendar)
        run: python -m unittest discover -s daily-news/calendar -p 'test_*.py' -v
      - name: Unit tests (prune)
        run: python -m unittest discover -s daily-news -p 'test_prune.py' -v

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title follows Conventional Commits
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'
          if ! echo "$TITLE" | grep -qE "$PATTERN"; then
            echo "::error::PR title must follow Conventional Commits (type(scope): description): $TITLE"
            exit 1
          fi
